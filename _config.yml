title : Who is D. M.
name: 'Who is D. M.'
description: 'Projects, bits, and embedded consulting'

markdown: kramdown
highlighter: rouge
javascript_enabled: true

featured_posts_title: Unrelated
featured_posts:
  - url: '#'
    title: 'Featured post #1'
  - url: '#'
    title: 'Featured post #2'
  - url: '#'
    title: 'Featured post #3'

collections:
  news:
    title: News
    default_open: false
    output: true
  bits:
    title: Bits
    default_open: true
    output: true
  posts:
    title: Essays
    default_open: true
    output: true

defaults:
  - scope:
      type: bits
    values:
      title: Bits
      permalink: /bits/:title
  - scope:
      type: posts
    values:
      title: Essays
      permalink: /post/:title
  - scope:
      type: news
    values:
      title: News
      permalink: /news/:title

plugins:
  - jekyll-sitemap
